# WFC3/IR AstroDrizzle Parameters
# All drizzle parameters for this pipeline live here.
# Notebooks read from this file — do not hardcode these values in notebooks.
# Run /sync-params to verify notebooks are reading from this file correctly.

# --- Pixel grid ---
final_scale: 0.06          # output pixel scale in arcsec/pixel (native WFC3/IR = 0.13; docs suggest 0.065, advisor recommends 0.06)
final_pixfrac: 0.8         # pixel fraction (drop size); 0.8 improves resolution with sufficient dithers

# --- Kernel ---
final_kernel: square       # drizzle kernel: square, point, gaussian, turbo, tophat, lanczos3

# --- Bit masks (which pixels to use) ---
driz_sep_bits: 512         # bits for separate drizzle step (512 = good WFC3/IR pixels)
final_bits: 512            # bits for final combination step

# --- Combination ---
combine_type: minmed        # how to combine exposures: minmed, median, iminmed, sum, mean

# --- Sky subtraction ---
skymethod: localmin         # sky method: localmin, globalmin, match, global+match
skysub: True

# --- Output ---
final_wcs: True            # recompute output WCS
clean: True                # remove intermediate drizzle products after combining

# --- TweakReg ---
tweakreg:
  wcsname: 'Gaia'
  conv_width: 2.5        # 2x PSF FWHM: 2.5 for WFC3/IR, 3.5 for ACS/WFC or WFC3/UVIS
  threshold: 30.0        # source detection threshold in sigma
  search_radius: 5.0     # Gaia catalog search radius in arcmin
  searchrad: 0.1         # TweakReg matching search radius in arcsec
  fitgeometry: 'rscale'  # fitting geometry: rscale, shift, general
  minobj: 4              # minimum matched objects for a valid fit
  ylimit: 0.3            # y-axis limit for residual plots

# --- Download ---
download:
  proposal_id: '14706'
  instrument_name: 'WFC3/IR'
  project: 'HST'
  product_sub_group: 'FLT'
  data_type: 'CALWF3'

# --- ACS Download ---
# FLC files have the pixel-based CTE correction applied by CalACS (Anderson & Bedin 2010)
acs_download:
  proposal_id: '14706'
  instrument_name: 'ACS/WFC'
  project: 'HST'
  product_sub_group:
    - 'FLC'
    - 'FLT'
  data_type: 'CALACS'

# --- ACS Drizzle ---
acs_drizzle:
  final_scale: 0.03          # output pixel scale in arcsec/pixel (native ACS/WFC = 0.05)
  final_pixfrac: 0.4         # tighter drop size for ACS — finer native pixel scale
  final_kernel: square
  driz_sep_bits: 512
  final_bits: 512
  combine_type: minmed
  skymethod: localmin
  final_wcs: True

# --- Notes ---
# pixfrac=1.0 is a safe starting point; reduce (e.g. 0.8) to improve resolution
# if you have sufficient dithers (>4 exposures per target).
# final_scale=0.06 set per advisor recommendation (docs suggest 0.065 for WFC3/IR).
# Both oversample relative to native 0.13"/pix — justified by dither coverage.
# final_pixfrac=0.8 improves resolution; valid given >4 exposures per target for most quasars.
# Revisit after inspecting output in 05_inspect_outputs.ipynb.
